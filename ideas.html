<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Club - Ideas & Updates</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-particles"></div>
  <div class="background-glow"></div>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">File Club</span>
      </div>
      <div class="nav-controls">
        <div class="theme-dropdown">
          <button class="theme-btn" id="themeBtn" title="Change Theme">🎨</button>
          <div class="theme-menu" id="themeMenu"></div>
        </div>
        <a href="games.html" class="nav-link">🏠 Home</a>
        <a href="games.html" class="nav-link">🎮 Games</a>

        <a href="chat.html" class="nav-link">💬 Chat</a>
        <a href="music.html" class="nav-link">🎵 Music</a>
        <a href="ideas.html" class="nav-link">💡 Ideas</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <section class="chat-section" style="margin-top: 120px;">
    <div class="chat-container" style="max-width: 900px;">
      <h1 class="section-title" style="margin-bottom: 1rem;">💡 Ideas for Updates</h1>
      <p style="margin-top: -0.25rem; margin-bottom: 1rem; color: var(--text-secondary);">
        Your submissions are saved locally in your browser under <code>ideaSubmissions</code> (so you can view them here).
      </p>


      <div class="chat-box" style="height: auto;">
        <form id="ideaForm" style="display:flex; flex-direction:column; gap: 1rem;">
          <div class="message-input-container" style="margin-bottom: 0;">
            <input
              type="text"
              id="ideaTitle"
              maxlength="60"
              placeholder="Idea title (example: Add a new game)"
              required
              style="width: 100%; padding: 0.9rem; background: rgba(20, 30, 60, 0.6); border: 2px solid rgba(0, 217, 255, 0.2); border-radius: 8px; color: var(--text-primary); font-size: 1rem;"
            />
          </div>

          <div class="message-input-container" style="margin-bottom: 0;">
            <textarea
              id="ideaText"
              maxlength="500"
              placeholder="Describe your idea..."
              required
              style="width: 100%; min-height: 140px; padding: 0.9rem; background: rgba(20, 30, 60, 0.6); border: 2px solid rgba(0, 217, 255, 0.2); border-radius: 8px; color: var(--text-primary); font-size: 1rem; resize: vertical;"
            ></textarea>
          </div>

          <div class="message-input-container" style="margin-bottom: 0;">
            <input
              type="url"
              id="ideaLink"
              maxlength="300"
              placeholder="Optional link (prototype/video/game page)"
              style="width: 100%; padding: 0.9rem; background: rgba(20, 30, 60, 0.6); border: 2px solid rgba(0, 217, 255, 0.2); border-radius: 8px; color: var(--text-primary); font-size: 1rem;"
            />
          </div>

          <div style="display:flex; gap: 1rem; flex-wrap: wrap;">
            <button type="submit" class="send-btn" style="flex: 1;">Submit Idea</button>
            <button type="button" class="clear-chat-btn" id="clearIdeasBtn" style="flex: 1;">Clear My Local Ideas</button>
          </div>

          <div id="ideaStatus" style="color: var(--text-secondary); font-size: 0.95rem; min-height: 1.2rem;"></div>
        </form>
      </div>

      <div style="height: 1.5rem;"></div>

      <h2 class="section-title" style="margin: 0 0 1rem 0;">Latest Submissions</h2>
      <div class="chat-box" id="ideasList" style="height: auto; padding: 1rem;">
        <!-- items -->
      </div>
    </div>
  </section>

  <script src="theme.js"></script>
  <script src="auth.js"></script>
  <script>
    const STORAGE_KEY = 'ideaSubmissions';

    function loadIdeas() {
      const list = document.getElementById('ideasList');
      if (!list) return;

      let ideas = [];
      try {
        ideas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {}

      if (ideas.length === 0) {
        list.innerHTML = '<div class="empty-chat">No ideas submitted yet. Be the first!</div>';
        return;
      }

      list.innerHTML = ideas
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
        .slice(0, 50)
        .map((idea) => {
          const when = idea.timestamp ? new Date(idea.timestamp).toLocaleString() : '';
          const link = idea.link ? `<a href="${idea.link}" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); font-weight: 700;">Open link</a>` : '';
          return `
            <div class="profile-card" style="margin-bottom: 0.9rem;">
              <div class="profile-header">
                <div class="profile-info" style="display:flex; flex-direction:column; gap: 0.25rem;">
                  <span class="username-glow">${escapeHtml(idea.title || 'Untitled')}</span>
                  <span class="message-time">${when}</span>
                </div>
              </div>
              <div class="message-text" style="margin-top: 0.5rem; color: var(--text-secondary);">${escapeHtml(idea.text || '')}</div>
              ${link ? `<div style="margin-top: 0.7rem;">${link}</div>` : ''}
            </div>
          `;
        })
        .join('');
    }

    function saveIdea(idea) {
      let ideas = [];
      try { ideas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) {}
      ideas.push(idea);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadIdeas();

      const form = document.getElementById('ideaForm');
      const status = document.getElementById('ideaStatus');

      form?.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('ideaTitle').value.trim();
        const text = document.getElementById('ideaText').value.trim();
        const link = document.getElementById('ideaLink').value.trim();

        const idea = {
          title,
          text,
          link,
          timestamp: Date.now()
        };

        saveIdea(idea);
        form.reset();
        status.textContent = 'Saved! Thanks for the idea.';
        loadIdeas();

        setTimeout(() => {
          status.textContent = '';
        }, 2000);
      });

      document.getElementById('clearIdeasBtn')?.addEventListener('click', () => {
        if (!confirm('This clears ideas stored in your browser (local only). Continue?')) return;
        localStorage.removeItem(STORAGE_KEY);
        loadIdeas();
      });
    });

    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '<',
        '>': '>',
        '"': '"',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Clicker - Unblocked Games</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .game-container {
      width: 100%;
      height: 700px;
      margin-bottom: 20px;
    }

    iframe {
      border: 0;
    }
  </style>
</head>
<body>
  <div class="container" style="padding: 20px; max-width: 100%;">
    <div class="game-header">
      <h1>Cookie Clicker</h1>
      <a href="../games.html" class="btn-home">🏠 Home</a>
    </div>

    <div class="game-container">
      <!-- NOTE: Cookie Clicker is served by an external host.
           If the iframe is blocked by that host, the game may not load. -->
      <iframe
        id="cookieClickerFrame"
        title="Cookie Clicker"
        name="cookieClickerFrame"
        allowfullscreen
        scrolling="no"
        sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-downloads"
        src="https://orteil.dashnet.org/cookieclicker/"
        style="width: 100%; height: 100%;"
      ></iframe>
    </div>
  </div>

  <script src="jome.js"></script>
</body>
</html>

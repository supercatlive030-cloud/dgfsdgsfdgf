<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Small World Cup - Unblocked Games</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      height: 100%;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    src="https://www.miniplay.com/embed/a-small-world-cup"
    style="width:100%;height:100%;"
    frameborder="0"
    allowfullscreen
  ></iframe>

  <script>
    window.addEventListener('beforeunload', (e) => {
      // Don't force-redirect when leaving; user uses Home button.
      try {
        if (e && e.preventDefault) e.preventDefault();
      } catch (err) {}
    });

  </script>

    <script src="jome.js"></script>
</body>
</html>

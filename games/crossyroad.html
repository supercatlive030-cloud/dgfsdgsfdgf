<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossy Road - Unblocked Games</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .game-container {
            width: 100%;
            height: 600px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 20px; max-width: 100%;">
        <div class="game-header">
            <h1>🚗 Crossy Road</h1>
            <a href="../home.html" class="btn-home">🏠 Home</a>

        </div>
        
        <div class="game-container">
            <iframe class="game-iframe" frameborder="0" height="600" id="gameFrame" scrolling="no" src="https://ubgwtf.gitlab.io/crossy-road/" style="background:black; width: 100%; height: 100%;"></iframe>
        </div>
    </div>

    <script>
        window.addEventListener('beforeunload', () => {
            try {
                if (!window.location.href.toLowerCase().includes('disguise')) {
                    // Don't force-redirect when leaving; user uses Home button.
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
